name: CI / CD

on:
  push:
    branches:
      - main

jobs:
  ci-cd:
    name: Lint, Test, Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Install ──────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Lint ─────────────────────────────────────────────────────────────
      - name: Lint API
        run: npm run lint
        working-directory: apps/api

      - name: Lint Web
        run: npm run lint
        working-directory: apps/web

      # ── Test ─────────────────────────────────────────────────────────────
      - name: Generate Prisma client
        run: npm run prisma:generate
        working-directory: apps/api

      - name: Test API
        run: npm run test
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET_DEV }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET_DEV }}
          APP_WEB_URL: http://localhost:4200
          ALLOWED_ORIGIN: http://localhost:4200

      - name: Test Web
        run: npm run test -- --watch=false
        working-directory: apps/web

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build API
        run: npm run build
        working-directory: apps/api

      - name: Migrate production database
        run: npm run prisma:migrate:deploy
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      - name: Sync Render environment variables
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET_PROD }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET_PROD }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          APP_WEB_URL: ${{ vars.APP_WEB_URL_PROD }}
          ALLOWED_ORIGIN: ${{ vars.ALLOWED_ORIGIN_PROD }}
        run: |
          curl -s -f -X PUT \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg db "$DATABASE_URL" \
              --arg access "$JWT_ACCESS_SECRET" \
              --arg refresh "$JWT_REFRESH_SECRET" \
              --arg brevo "$BREVO_API_KEY" \
              --arg emailFrom "$EMAIL_FROM" \
              --arg appWeb "$APP_WEB_URL" \
              --arg origin "$ALLOWED_ORIGIN" \
              '[
                {key: "DATABASE_URL", value: $db},
                {key: "JWT_ACCESS_SECRET", value: $access},
                {key: "JWT_REFRESH_SECRET", value: $refresh},
                {key: "BREVO_API_KEY", value: $brevo},
                {key: "EMAIL_FROM", value: $emailFrom},
                {key: "APP_WEB_URL", value: $appWeb},
                {key: "ALLOWED_ORIGIN", value: $origin}
              ]')" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars"

      - name: Inject API_BASE_URL into environment.prod.ts
        run: |
          sed -i "s|%%API_BASE_URL%%|${{ secrets.API_BASE_URL }}|g" \
            apps/web/src/environments/environment.prod.ts

      - name: Build Web
        run: npm run build
        working-directory: apps/web

      # ── Deploy backend → Render ──────────────────────────────────────────
      - name: Deploy API to Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | grep -q "^2"
        shell: bash

      # ── Deploy frontend → Vercel ──────────────────────────────────────────
      - name: Deploy Web to Vercel
        run: npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
