<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ 'VERIFY.TITLE' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="flex flex-col items-center justify-center min-h-full py-12 gap-4">
    @if (loading()) {
      <ion-spinner name="crescent" color="primary"></ion-spinner>
      <p class="text-sm text-gray-500">{{ 'VERIFY.LOADING' | translate }}</p>
    } @else if (error()) {
      <ion-text color="danger">
        <p class="text-center">{{ error() | translate }}</p>
      </ion-text>
    }
  </div>
</ion-content>
