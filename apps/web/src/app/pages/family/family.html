<app-header titleKey="FAMILY.TITLE"></app-header>

<ion-content class="ion-padding">
  <div class="flex flex-col items-center justify-center min-h-full py-12">
    <form class="w-full max-w-sm flex flex-col gap-4" [formGroup]="form" (ngSubmit)="submit()">
      <p class="text-sm text-gray-600 text-center mb-2">{{ 'FAMILY.SUBTITLE' | translate }}</p>

      <ion-item>
        <ion-input
          type="email"
          formControlName="email"
          [label]="'FAMILY.EMAIL' | translate"
          labelPlacement="stacked"
        ></ion-input>
      </ion-item>

      @if (successEmail(); as sentTo) {
        <ion-text color="success">
          <p class="text-sm">{{ 'FAMILY.SUCCESS' | translate: { email: sentTo } }}</p>
        </ion-text>
      }

      @if (error()) {
        <ion-text color="danger">
          <p class="text-sm">{{ error() | translate }}</p>
        </ion-text>
      }

      <ion-button expand="block" type="submit" [disabled]="loading()">
        {{ 'FAMILY.SUBMIT' | translate }}
      </ion-button>
    </form>
  </div>
</ion-content>
