<app-header titleKey="ONBOARDING_JOIN.TITLE"></app-header>

<ion-content class="ion-padding">
  <div class="flex flex-col items-center justify-center min-h-full py-12">
    <form class="w-full max-w-sm flex flex-col gap-4" [formGroup]="form" (ngSubmit)="submit()">
      <p class="text-sm text-gray-600 text-center mb-2">{{ 'ONBOARDING_JOIN.SUBTITLE' | translate }}</p>

      <ion-item>
        <ion-input
          formControlName="username"
          [label]="'ONBOARDING_JOIN.USERNAME' | translate"
          labelPlacement="stacked"
        ></ion-input>
      </ion-item>

      @if (error()) {
        <ion-text color="danger">
          <p class="text-sm">{{ error() | translate }}</p>
        </ion-text>
      }

      <ion-button expand="block" type="submit" [disabled]="loading()">
        {{ 'ONBOARDING_JOIN.SUBMIT' | translate }}
      </ion-button>
    </form>
  </div>
</ion-content>
