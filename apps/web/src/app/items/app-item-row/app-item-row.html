<ion-item
  [button]="!archiveMode()"
  detail="false"
  lines="none"
  class="[--background:transparent] [--inner-padding-end:0] [--min-height:48px] [--padding-end:0.25rem] [--padding-start:0.5rem]"
  (click)="onRowClick()"
>
  <div slot="start" class="me-1 flex w-11 shrink-0 items-center justify-center">
    @if (archiveMode()) {
      <ion-checkbox
        class="m-0 [--size:22px]"
        [checked]="selected()"
        (ionChange)="onSelect($any($event).detail.checked)"
        (click)="$event.stopPropagation()"
      ></ion-checkbox>
    } @else {
      <ion-button
        fill="clear"
        class="m-0 h-10 w-11 [--padding-end:0] [--padding-start:0]"
        [disabled]="!canComplete()"
        (click)="onComplete($event)"
      >
        <ion-icon
          slot="icon-only"
          [icon]="statusIcon()"
          [class]="statusIconClass()"
        ></ion-icon>
      </ion-button>
    }
  </div>

  <ion-label class="ion-text-wrap min-w-0 flex-1">
    <div [class]="titleClass()">{{ title() }}</div>
    @if (meta()) {
      <p class="mt-0.5 text-xs text-gray-400">{{ meta() }}</p>
    }
  </ion-label>

  @if (!archiveMode()) {
    <ion-button
      slot="end"
      fill="clear"
      class="m-0 h-10 w-11 [--padding-end:0] [--padding-start:0]"
      (click)="onEdit($event)"
    >
      <ion-icon slot="icon-only" icon="ellipsis-horizontal"></ion-icon>
    </ion-button>
  }
</ion-item>
