@if (items().length > 0) {
  <section class="item-section">
    @if (collapsible()) {
      <button
        type="button"
        class="mb-2 flex w-full cursor-pointer items-center justify-between !border-0 !bg-transparent px-1 py-2 text-xs font-semibold uppercase tracking-wide text-gray-500"
        (click)="sectionToggle.emit()"
      >
        <span>{{ titleKey() | translate: titleParams() }}</span>
        <ion-icon [icon]="expanded() ? 'chevron-up-outline' : 'chevron-down-outline'"></ion-icon>
      </button>
    } @else {
      <p class="mb-2 ml-1 px-1 py-2 text-xs font-semibold uppercase tracking-wide text-gray-500">
        {{ titleKey() | translate: titleParams() }}
      </p>
    }

    @if (!collapsible() || expanded()) {
      <ion-list class="overflow-hidden rounded-xl border border-gray-200 bg-white p-0" lines="none">
        @for (item of items(); track item.id) {
          <app-item-row
            [item]="item"
            [archiveMode]="archiveMode()"
            [selected]="selectedIds().has(item.id)"
            [translateUnit]="translateUnit()"
            (completeClick)="completeClick.emit(item)"
            (editClick)="editClick.emit(item)"
            (rowClick)="editClick.emit(item)"
            (selectionChange)="selectionChange.emit({ id: item.id, selected: $event })"
          ></app-item-row>
        }
      </ion-list>
    }
  </section>
}
