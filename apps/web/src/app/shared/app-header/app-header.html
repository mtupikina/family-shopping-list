<ion-header>
  <ion-toolbar color="primary">

    <ion-buttons slot="start">
      <ion-menu-button />
    </ion-buttons>

    <ion-title>
      {{ titleKey() | translate }}
    </ion-title>

    <ion-buttons slot="end">

      <ion-button fill="clear" [attr.aria-label]="connectivityLabel() | translate">
        <ion-icon
          [color]="connectivityColor()"
          [name]="connectivityIcon()">
        </ion-icon>
      </ion-button>

      <ion-button
        fill="clear"
        [attr.aria-label]="syncLabel() | translate">
        <ion-icon
          name="sync-outline"
          [class.animate-spin]="syncSpinning()">
        </ion-icon>
      </ion-button>

    </ion-buttons>

  </ion-toolbar>
</ion-header>
