<ion-menu contentId="main-content" type="overlay">
  @if (isAuthenticated()) {
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title class="px-2">{{ menuTitle() }}</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list lines="none" class="py-2">
        <ion-item
          class="![--min-height:52px] ![--padding-start:1.25rem]"
          button
          routerLink="/"
          routerDirection="root"
          (click)="closeMenu()"
          detail="false"
        >
          <ion-icon
            slot="start"
            class="!me-6 !size-4 shrink-0 !text-base"
            name="home-outline"
            aria-hidden="true"
          ></ion-icon>
          <ion-label>{{ 'HEADER.HOME' | translate }}</ion-label>
        </ion-item>
        <ion-item
          class="![--min-height:52px] ![--padding-start:1.25rem]"
          button
          routerLink="/archived"
          routerDirection="forward"
          (click)="closeMenu()"
          detail="false"
        >
          <ion-icon
            slot="start"
            class="!me-6 !size-4 shrink-0 !text-base"
            name="archive-outline"
            aria-hidden="true"
          ></ion-icon>
          <ion-label>{{ 'HEADER.ARCHIVED' | translate }}</ion-label>
        </ion-item>
        <ion-item
          class="![--min-height:52px] ![--padding-start:1.25rem]"
          button
          routerLink="/family"
          routerDirection="forward"
          (click)="closeMenu()"
          detail="false"
        >
          <ion-icon
            slot="start"
            class="!me-6 !size-4 shrink-0 !text-base"
            name="people-outline"
            aria-hidden="true"
          ></ion-icon>
          <ion-label>{{ 'HEADER.FAMILY' | translate }}</ion-label>
        </ion-item>
        <ion-item
          class="![--min-height:52px] ![--padding-start:1.25rem]"
          button
          (click)="logout()"
          detail="false"
        >
          <ion-icon
            slot="start"
            class="!me-6 !size-4 shrink-0 !text-base"
            name="log-out-outline"
            aria-hidden="true"
          ></ion-icon>
          <ion-label>{{ 'HEADER.SIGN_OUT' | translate }}</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  }
</ion-menu>
