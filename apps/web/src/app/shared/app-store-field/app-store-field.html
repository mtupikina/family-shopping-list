<div class="flex-1">
  <ion-input
    fill="outline"
    class="mb-2 w-full [--border-color:#e5e7eb] [--border-radius:0.5rem]"
    [label]="'ITEMS.STORE' | translate"
    labelPlacement="stacked"
    autocomplete="off"
    [value]="value()"
    (ionInput)="onInput($any($event).detail.value ?? '')"
    (ionFocus)="focused.set(true)"
    (ionBlur)="onBlur()"
  ></ion-input>
  @if (focused() && suggestions().length > 0) {
    <div class="mt-2 flex flex-wrap gap-2">
      @for (store of suggestions(); track store) {
        <ion-chip
          class="m-0 cursor-pointer rounded-full border border-gray-200 bg-gray-50 px-3.5 py-1.5 text-sm text-gray-700 [--background:#f9fafb] [--color:#374151] hover:[--background:#eff6ff] hover:[--color:#1d4ed8] hover:border-blue-300"
          (mousedown)="$event.preventDefault()"
          (click)="pick(store)"
        >
          {{ store }}
        </ion-chip>
      }
    </div>
  }
</div>
