<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ 'ONBOARDING.TITLE' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="flex flex-col items-center justify-center min-h-full py-12">
    <form class="w-full max-w-sm flex flex-col gap-4" [formGroup]="form" (ngSubmit)="submit()">
      <p class="text-sm text-gray-600 text-center mb-2">{{ 'ONBOARDING.SUBTITLE' | translate }}</p>

      <ion-item>
        <ion-input
          formControlName="familyName"
          [label]="'ONBOARDING.FAMILY_NAME' | translate"
          labelPlacement="stacked"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          formControlName="username"
          [label]="'ONBOARDING.USERNAME' | translate"
          labelPlacement="stacked"
        ></ion-input>
      </ion-item>

      @if (error()) {
        <ion-text color="danger">
          <p class="text-sm">{{ error() | translate }}</p>
        </ion-text>
      }

      <ion-button expand="block" type="submit" [disabled]="loading()">
        {{ 'ONBOARDING.SUBMIT' | translate }}
      </ion-button>
    </form>
  </div>
</ion-content>
